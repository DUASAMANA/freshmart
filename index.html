<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2>FreshMart</h2>
                </div>
                <div class="nav-icons">
                    <div class="cart-icon" id="cartIcon">
                        <span class="cart-count" id="cartCount">0</span>
                        🛒
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- Products Section -->
        <section class="products-section">
            <div class="container">
                <h1 class="section-title">Featured Products</h1>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be dynamically generated by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Shopping Cart Modal -->
        <div class="cart-modal" id="cartModal">
            <div class="cart-modal-content">
                <div class="cart-header">
                    <h2>Shopping Cart</h2>
                    <span class="close-cart" id="closeCart">&times;</span>
                </div>
                <div class="cart-items" id="cartItems">
                    <p class="empty-cart">Your cart is empty</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Total:<span id="cartTotal">0.00</span></span>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn" disabled>Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
